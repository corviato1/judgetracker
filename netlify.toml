[build]
  command   = "npm run build"
  publish   = "build"
  functions = "netlify/functions"

[dev]
  command = "bash start.sh"
  port    = 5000

[[redirects]]
  from   = "/api/*"
  to     = "/.netlify/functions/api/:splat"
  status = 200

[[redirects]]
  from   = "/*"
  to     = "/index.html"
  status = 200
